<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accelerated 6 · Unit 6 Interactive Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surf:#161b22;--s2:#1f2937;--border:#2d3748;
  --text:#e2e8f0;--muted:#64748b;--muted2:#94a3b8;
  --blue:#3b82f6;--green:#22c55e;--amber:#f59e0b;--orange:#f97316;--red:#ef4444;--purple:#a855f7;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}

/* HEADER */
#hdr{background:linear-gradient(180deg,#1a2035 0%,#0d1117 100%);border-bottom:1px solid var(--border);padding:18px 20px 0;position:sticky;top:0;z-index:99;box-shadow:0 4px 24px rgba(0,0,0,.5)}
.hdr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:14px;flex-wrap:wrap}
h1{font-family:'Fredoka One',cursive;font-size:clamp(20px,3.5vw,30px);color:#fff;line-height:1.1}
h1 span{background:linear-gradient(90deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{font-size:12px;color:var(--muted2);font-weight:700;margin-top:3px;letter-spacing:.5px}
.prog-block{text-align:right;min-width:130px}
.prog-lbl{font-size:10px;color:var(--muted);font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.prog-num{font-family:'Fredoka One',cursive;font-size:24px;color:#fff;line-height:1}
.prog-sub{font-size:10px;color:var(--muted2);font-weight:700;margin-bottom:5px}
.prog-bar{height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:3px;transition:width .5s ease;width:0}

/* TABS */
.tabs{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:9px 14px;border-radius:8px 8px 0 0;background:transparent;border:1px solid transparent;border-bottom:none;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;transition:all .18s;display:flex;align-items:center;gap:6px}
.tab-btn:hover{background:rgba(255,255,255,.04);color:var(--text)}
.tab-btn.active{background:var(--surf);color:#fff;border-color:var(--border);border-bottom-color:var(--surf)}
.tab-num{width:18px;height:18px;border-radius:50%;background:var(--s2);display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;flex-shrink:0}
.tab-btn.active .tab-num{background:var(--blue);color:#fff}

/* CONTENT */
.content{max-width:840px;margin:0 auto;padding:28px 16px 100px}
.sec-panel{display:none}.sec-panel.active{display:block}
.sec-title{font-family:'Fredoka One',cursive;font-size:clamp(20px,3vw,26px);color:#fff;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.concept-box{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.22);border-left:4px solid var(--blue);border-radius:10px;padding:14px 18px;font-size:14px;font-weight:600;color:#93c5fd;line-height:1.6;margin-bottom:24px}
.concept-box em{color:#bfdbfe;font-style:normal;font-weight:900}

/* CARDS */
.card{border-radius:12px;margin-bottom:14px;overflow:hidden;border:1px solid var(--border)}
.card-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;cursor:pointer;user-select:none}
.card-hdr:hover{filter:brightness(1.07)}
.tier-left{display:flex;align-items:center;gap:10px}
.tier-icon{font-size:24px;flex-shrink:0}
.tier-name{font-family:'Fredoka One',cursive;font-size:17px;color:#fff}
.tier-sub{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);margin-top:1px}
.card-right{display:flex;align-items:center;gap:8px}
.done-pill{display:none;align-items:center;gap:4px;padding:4px 10px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.35);border-radius:20px;font-size:11px;font-weight:800;color:#86efac}
.done-pill.show{display:inline-flex}
.chev{font-size:14px;color:rgba(255,255,255,.45);transition:transform .25s}
.card-hdr.open .chev{transform:rotate(180deg)}
.t-worked .card-hdr{background:linear-gradient(135deg,#1e3a6e,#152d52)}.t-worked{border-color:rgba(59,130,246,.4)}
.t-mild .card-hdr{background:linear-gradient(135deg,#14532d,#166534)}.t-mild{border-color:rgba(34,197,94,.4)}
.t-medium .card-hdr{background:linear-gradient(135deg,#78350f,#92400e)}.t-medium{border-color:rgba(245,158,11,.4)}
.t-spicy .card-hdr{background:linear-gradient(135deg,#7c2d12,#9a3412)}.t-spicy{border-color:rgba(249,115,22,.4)}
.t-spicy2 .card-hdr{background:linear-gradient(135deg,#881d09,#a83215)}.t-spicy2{border-color:rgba(239,68,68,.35)}
.t-extra .card-hdr{background:linear-gradient(135deg,#7f1d1d,#991b1b)}.t-extra{border-color:rgba(239,68,68,.4)}
.t-super .card-hdr{background:linear-gradient(135deg,#4c1d95,#5b21b6)}.t-super{border-color:rgba(168,85,247,.4)}

/* CARD BODY */
.card-body{background:var(--surf);padding:20px;display:none;border-top:1px solid var(--border)}
.card-body.open{display:block;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.problem{font-size:14.5px;line-height:1.8;color:var(--text);margin-bottom:16px}
.problem strong{color:#fff;font-weight:900}
.problem em{font-style:italic;color:#cbd5e1}
.hint-box{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);border-radius:8px;padding:11px 15px;font-size:13.5px;font-weight:700;color:#93c5fd;margin-bottom:16px;line-height:1.5}

/* VISUAL BOXES */
.vis-box{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.08);border-radius:12px;margin-bottom:18px;overflow:hidden}
.vis-title{background:rgba(255,255,255,.05);padding:10px 16px;font-size:12.5px;font-weight:800;color:#cbd5e1;letter-spacing:.3px;border-bottom:1px solid rgba(255,255,255,.06)}
.vis-body{padding:16px}
.vis-note{font-size:12.5px;font-weight:700;color:#94a3b8;margin-top:12px;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:6px;line-height:1.5}
.vis-note strong{color:#e2e8f0}
.rtable{width:100%;border-collapse:collapse;font-size:14px}
.rtable th{background:rgba(59,130,246,.15);color:#93c5fd;font-weight:800;padding:8px 12px;text-align:center;font-size:13px}
.rtable td{padding:7px 12px;text-align:center;font-weight:700;color:var(--text);border-top:1px solid rgba(255,255,255,.05)}
.unit-row td{background:rgba(34,197,94,.1);color:#86efac;font-weight:900}
.eq-row td{background:rgba(59,130,246,.1);color:#93c5fd;font-style:italic}
.pe-vis{display:flex;align-items:center;justify-content:center;gap:16px;padding:8px 0;flex-wrap:wrap}
.pe-fraction{text-align:center;font-size:15px;font-weight:700}
.pe-top{color:#fca5a5;padding-bottom:6px}.pe-line{height:2px;background:#94a3b8}.pe-bot{color:#86efac;padding-top:6px}
.pe-times{font-size:22px;font-weight:900;color:var(--amber)}
.tape-wrap{display:flex;align-items:flex-start;gap:12px}
.tape-label-l{font-size:12px;font-weight:800;color:var(--muted2);padding-top:8px;min-width:55px}
.tape-bars{flex:1;display:flex;flex-direction:column;gap:8px}
.tape-row{display:flex;height:38px}
.tape-100{flex:5;background:rgba(59,130,246,.2);border:2px solid rgba(59,130,246,.5);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#93c5fd;border-radius:6px 0 0 6px}
.tape-inc{flex:2;background:rgba(34,197,94,.2);border:2px solid rgba(34,197,94,.5);border-left:none;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#86efac;border-radius:0 6px 6px 0}
.tape-only{flex:1;background:rgba(59,130,246,.2);border:2px solid rgba(59,130,246,.5);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#93c5fd;border-radius:6px}
.fd-vis{display:flex;align-items:center;flex-wrap:wrap;gap:8px;justify-content:center}
.fd-step{text-align:center;padding:10px 14px;background:rgba(255,255,255,.05);border-radius:10px;border:1px solid rgba(255,255,255,.1)}
.fd-lbl{font-size:11px;font-weight:800;color:var(--muted2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.fd-expr{font-size:18px;font-weight:700;color:var(--text)}
.fd-arrow{font-size:22px;color:var(--muted);font-weight:900}
.fd-flip{border-color:rgba(245,158,11,.4);background:rgba(245,158,11,.08)}
.fd-flip .fd-lbl{color:#fcd34d}.fd-flip .fd-expr{color:#fde68a}
.fd-ans{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.08)}
.fd-ans .fd-lbl{color:#86efac}.fd-ans .fd-expr{color:#86efac}
.disc-bar-wrap{display:flex;flex-direction:column;gap:8px}
.disc-bar-row{display:flex;height:40px}
.disc-orig-full{flex:1;background:rgba(148,163,184,.12);border:2px solid rgba(148,163,184,.3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#cbd5e1;border-radius:8px}
.disc-pay{flex:7;background:rgba(59,130,246,.18);border:2px solid rgba(59,130,246,.4);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#93c5fd;border-radius:8px 0 0 8px}
.disc-save{flex:3;background:rgba(34,197,94,.18);border:2px solid rgba(34,197,94,.4);border-left:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#86efac;border-radius:0 8px 8px 0}
.flow-vis{display:flex;flex-direction:column;align-items:center;gap:0}
.flow-node{padding:10px 24px;border-radius:10px;font-size:14px;font-weight:800;text-align:center;min-width:180px}
.flow-node.orig{background:rgba(148,163,184,.12);border:2px solid rgba(148,163,184,.35);color:#cbd5e1}
.flow-node.sale{background:rgba(245,158,11,.12);border:2px solid rgba(245,158,11,.4);color:#fde68a}
.flow-node.final{background:rgba(34,197,94,.12);border:2px solid rgba(34,197,94,.4);color:#86efac}
.flow-arrow-down{font-size:12px;font-weight:700;color:var(--muted2);padding:6px 0;text-align:center}
.formula-trio{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:520px){.formula-trio{grid-template-columns:1fr}}
.ftrio-card{border-radius:10px;padding:12px;text-align:center;border:1px solid}
.ftrio-blue{background:rgba(59,130,246,.09);border-color:rgba(59,130,246,.3)}
.ftrio-amber{background:rgba(245,158,11,.09);border-color:rgba(245,158,11,.3)}
.ftrio-green{background:rgba(34,197,94,.09);border-color:rgba(34,197,94,.3)}
.ftrio-icon{font-size:22px;margin-bottom:4px}
.ftrio-title{font-size:12px;font-weight:900;margin-bottom:6px}
.ftrio-blue .ftrio-title{color:#93c5fd}.ftrio-amber .ftrio-title{color:#fde68a}.ftrio-green .ftrio-title{color:#86efac}
.ftrio-formula{font-size:11.5px;font-weight:700;line-height:1.6}
.ftrio-blue .ftrio-formula{color:#bfdbfe}.ftrio-amber .ftrio-formula{color:#fef3c7}.ftrio-green .ftrio-formula{color:#d1fae5}

/* STEPS */
.steps{margin-bottom:16px}
.step{margin-bottom:14px;padding:14px;background:var(--s2);border-radius:10px;border:1px solid var(--border)}
.step-lbl{font-size:11.5px;font-weight:900;color:var(--muted2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--blue);color:#fff;font-size:10px;font-weight:900;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.check-input-row{display:flex;gap:8px;align-items:flex-start;flex-wrap:wrap}
.check-input{flex:1;min-width:180px;padding:9px 13px;background:var(--bg);border:2px solid var(--border);border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;transition:border-color .18s}
.check-input:focus{outline:none;border-color:var(--blue)}
.check-input[disabled]{opacity:.65;cursor:default;background:rgba(255,255,255,.03)}
.check-input.shake{border-color:var(--red)!important;animation:shake .4s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.check-btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:none;border-radius:8px;background:linear-gradient(135deg,#1d4ed8,#2563eb);color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s;white-space:nowrap;min-width:110px;justify-content:center}
.check-btn:hover:not([disabled]){background:linear-gradient(135deg,#2563eb,#3b82f6);transform:translateY(-1px)}
.check-btn[disabled]{opacity:.6;cursor:default;transform:none}
.check-btn.correct{background:linear-gradient(135deg,#15803d,#16a34a)!important}
.step-ans{padding:11px 15px;border-radius:8px;background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.22);font-size:14px;font-weight:700;color:#93c5fd;display:none;line-height:1.65;margin-top:8px}
.step-ans.show{display:block;animation:fadeIn .2s ease}

/* AI FEEDBACK */
.ai-fb-wrap{margin-top:10px;display:none}
.ai-fb-wrap.show{display:block;animation:fadeIn .25s ease}
.ai-correct{display:flex;align-items:flex-start;gap:10px;padding:13px 16px;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);border-radius:10px}
.ai-wrong{display:flex;align-items:flex-start;gap:10px;padding:13px 16px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:10px}
.ai-neutral{display:flex;align-items:flex-start;gap:10px;padding:13px 16px;background:rgba(148,163,184,.08);border:1px solid rgba(148,163,184,.22);border-radius:10px}
.ai-icon{font-size:18px;flex-shrink:0;margin-top:1px}
.ai-text{font-size:13.5px;font-weight:700;line-height:1.6}
.ai-correct .ai-text{color:#86efac}
.ai-wrong .ai-text{color:#fca5a5}
.ai-neutral .ai-text{color:#cbd5e1}
.ai-guide{padding:14px 16px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.25);border-radius:10px;margin-top:10px}
.ai-guide-title{font-size:11.5px;font-weight:900;color:#fcd34d;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.ai-guide-body{font-size:13.5px;font-weight:600;color:#fef3c7;line-height:1.75}
.retry-row{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;align-items:center}
.retry-btn{padding:8px 16px;border-radius:8px;border:1px solid rgba(148,163,184,.3);background:rgba(148,163,184,.08);color:var(--muted2);font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s}
.retry-btn:hover{background:rgba(148,163,184,.18);color:var(--text)}
.show-step-btn{padding:8px 16px;border-radius:8px;border:none;background:rgba(168,85,247,.18);color:#d8b4fe;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s}
.show-step-btn:hover{background:rgba(168,85,247,.32)}
.attempt-note{font-size:12px;color:var(--muted2);font-weight:700}

.tbl-input{width:50px;background:#0d1117;border:1px dashed #4b5563;color:#e2e8f0;text-align:center;border-radius:4px;padding:3px 4px;font-family:'Nunito',sans-serif;font-size:13px;outline:none;transition:border-color .18s}
.tbl-input:focus{border-color:#3b82f6;border-style:solid}
.tbl-input-wide{width:70px}
/* SPINNER */
.spinner{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-sm{display:inline-block;width:11px;height:11px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:4px}

/* MC */
.mc-question{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:12px;padding:10px 14px;background:var(--s2);border-radius:8px;border-left:3px solid var(--blue)}
.mc-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
@media(max-width:480px){.mc-grid{grid-template-columns:1fr}}
.mc-opt{padding:11px 15px;border:2px solid var(--border);border-radius:10px;background:var(--s2);color:var(--text);font-family:'Nunito',sans-serif;font-size:13.5px;font-weight:700;cursor:pointer;transition:all .18s;text-align:left;line-height:1.4}
.mc-opt:hover:not([disabled]){border-color:var(--blue);background:rgba(59,130,246,.09);color:#bfdbfe}
.mc-opt.correct{border-color:var(--green)!important;background:rgba(34,197,94,.12)!important;color:#86efac!important}
.mc-opt.wrong{border-color:var(--red)!important;background:rgba(239,68,68,.09)!important;color:#fca5a5!important}
.mc-opt[disabled]{cursor:default}
.mc-feedback{font-size:13.5px;font-weight:700;padding:11px 14px;border-radius:8px;margin-top:6px;display:none;line-height:1.6}
.mc-feedback.ok{display:block;background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#86efac}
.mc-feedback.no{display:block;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:#fca5a5}
.mc-feedback.loading{display:block;background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);color:#93c5fd}

/* OPEN PARTS */
.parts{margin-bottom:6px}
.part{margin-bottom:14px;padding:14px;background:var(--s2);border-radius:10px;border:1px solid var(--border)}
.part-q{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:10px;line-height:1.5}
.part-q strong{color:#fff;font-weight:900}
.work-hint{font-size:12px;color:var(--muted);font-weight:600;margin-bottom:8px;font-style:italic}
.work-box{width:100%;min-height:68px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-family:'Nunito',sans-serif;font-size:13.5px;resize:vertical;transition:border-color .18s}
.work-box::placeholder{color:var(--muted)}
.work-box:focus{outline:none;border-color:var(--purple)}
.show-ans-btn{display:inline-flex;align-items:center;gap:6px;margin-top:9px;padding:8px 16px;border:none;border-radius:9px;background:linear-gradient(135deg,#6d28d9,#7c3aed);color:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .18s;min-width:130px;justify-content:center}
.show-ans-btn:hover:not([disabled]){background:linear-gradient(135deg,#7c3aed,#8b5cf6);transform:translateY(-1px)}
.show-ans-btn[disabled]{opacity:.55;cursor:default;transform:none}
.ans-reveal{background:rgba(168,85,247,.07);border:1px solid rgba(168,85,247,.22);border-radius:9px;padding:13px 15px;font-size:14px;font-weight:600;color:#d8b4fe;line-height:1.75;margin-top:9px;display:none}
.ans-reveal.show{display:block;animation:fadeIn .2s ease}
.ans-reveal strong{color:#e9d5ff;font-weight:900}
.part-ai-fb{margin-top:10px}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
</style>
</head>
<body>
<header id="hdr">
  <div class="hdr-top">
    <div>
      <h1>Unit 6 <span>Study Guide</span></h1>
      <div class="subtitle">Accelerated 6 &nbsp;·&nbsp; Percentages &nbsp;·&nbsp; Proportional Relationships &nbsp;·&nbsp; Unit Rates</div>
    </div>
    <div class="prog-block">
      <div class="prog-lbl">Progress</div>
      <div class="prog-num" id="prog-count">0</div>
      <div class="prog-sub" id="prog-sub">problems completed</div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
    </div>
  </div>
  <nav class="tabs" id="tabs"></nav>
</header>
<main class="content" id="sections"></main>

<script>

{title:"Writing Equations for Proportional Relationships",emoji:"📐",
 concept:"Find the unit rate (always divide!). Then write an equation connecting your two variables.",
 levels:[
  {tier:"worked",note:"Fill in the blanks — learn as you go!",vis:"v1",
   problem:`Mahteb has a recipe for smoothies. She uses <strong>6 cups</strong> of frozen fruit to make <strong>4 smoothies</strong>. Imani will follow the same recipe, making <em>s</em> smoothies using <em>f</em> cups of frozen fruit.`,
   steps:[{label:"Step 1 · Find the unit rate (cups per smoothie)",ans:"6 &divide; 4 = <strong>3/2 = 1&frac12; cups per smoothie</strong>"},{label:"Step 2 · Write an equation for f (cups)",ans:"f = (3/2) &times; s"},{label:"Step 3 · Solve for s (smoothies)",ans:"s = f &divide; (3/2) = <strong>(2/3) &times; f</strong>"}],
   mcQ:"Which equation represents the relationship between s and f?",mc:["A.  s = (3/2)f","B.  s = (2/3)f","C.  f = (2/3)s","D.  s = 6f"],mcA:1,mcE:"f = (3/2)s → divide both sides by 3/2 → s = (2/3)f ✓"},
  {tier:"mild",note:"Most support — you've got this!",vis:"v1",
   problem:`Mason uses <strong>8 cups</strong> of lemonade mix to make <strong>4 pitchers</strong>. He will make <em>p</em> pitchers using <em>m</em> cups of mix.`,
   hint:"Find the unit rate (cups per pitcher) first, then write an equation for m and solve for p.",
   steps:[{label:"Step 1 · Find the unit rate (cups per pitcher)",ans:"8 &divide; 4 = <strong>2 cups per pitcher</strong>"},{label:"Step 2 · Write an equation for m (cups of mix)",ans:"m = 2 &times; p"},{label:"Step 3 · Solve for p (pitchers)",ans:"p = m &divide; 2 = <strong>(1/2) &times; m</strong>"}],
   mcQ:"Which equation shows the relationship between p and m?",mc:["A.  p = 2m","B.  p = (1/2)m","C.  m = (1/2)p","D.  p = 8m"],mcA:1,mcE:"Unit rate = 2 cups/pitcher → m = 2p → p = (1/2)m ✓"},

// ─── TEACHER STRATEGIES (extracted from DeeSh's solution methods) ──────────
const STRATEGIES={
0:"Percent Error method: Remember — the ACTUAL value is always the whole (= 100%). Find the error: |measured − actual|. That is the part. Divide: part ÷ whole, then × 100%. Example: measured 28 cm, actual 25 cm → whole = 25. Error = |28−25| = 3. So 3÷25 = 0.12 → 12% error.",
1:"Percent Increase (ratio table method): Original = 100%. Find 1%: divide original by 100. New% = 100% + increase%. Multiply the 1% value by new%. Example: 200 plants, 40% more → 1% = 2 plants → new% = 140% → 140 x 2 = 280. Or multiply: 1.40 x 200 = 280.",
2:"Discount method: Figure out what % you are PAYING: 100% − discount% = pay%. Multiply price by pay% as a decimal. Example: 20% off means paying 80% → 0.80 × $18 = $14.40. To find the ORIGINAL price from a sale price: divide by the pay% decimal → $18 ÷ 0.80 = $22.50.",
3:"Discount then Tax method (2 steps): Step 1 — Apply discount first to get sale price: original × (1 − discount%). Step 2 — Apply tax to the SALE price (not original): sale price × (1 + tax%). Example: $20 meal, 15% off, 7% tax → 0.85×$20=$17 → 1.07×$17=$18.19.",
4:"Commission/Markup/Raise methods: Commission = decimal × sales. Example: 2.5% of $900 → 0.025×900=$22.50. Markup% = (sell−cost)÷cost×100%. Example: buy $50 sell $80 → $30÷$50=0.60=60% markup. Percent raise: new wage = old wage × (1+raise%). Example: $12 × 1.05 = $12.60.",
5:"Ratio Table method: Draw two columns for your two variables. Put the given values in row 1. Divide BOTH columns to find the unit rate (make one column equal to 1). Write the equation using the unit rate. Example: 9 cups for 6 bags → unit rate = 9÷6 = 1.5 cups per bag → c = 1.5b → so b = (2/3)c.",
6:"Unit Rate with Fractions: Set up a ratio table (value | time). Convert fractions to decimals. Divide BOTH columns by the time value to get per-1 rate. Example: 3/4 km per 3/2 sec → table: 0.75|1.5 → divide both by 1.5 → 0.5|1 → speed = 0.5 km/sec."
};

let doneCount=0, totalCount=0;

function stripHtml(s){
  return s.replace(/<[^>]+>/g,'')
    .replace(/&[a-z0-9#]+;/g,c=>({'&amp;':'&','&lt;':'<','&gt;':'>','&times;':'×','&divide;':'÷','&minus;':'-','&asymp;':'≈','&rarr;':'→','&frac12;':'½','&frac14;':'¼','&frac13;':'⅓','&frac25;':'⅖','&nbsp;':' '}[c]||c));
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}

function updateProgress(){
  const fill=document.getElementById('prog-fill');
  const num=document.getElementById('prog-count');
  const pct=totalCount>0?(doneCount/totalCount*100):0;
  fill.style.width=pct+'%';
  num.textContent=doneCount;
  document.getElementById('prog-sub').textContent=`/ ${totalCount} completed`;
}
function markCardDone(id){document.getElementById(`${id}_done`)?.classList.add('show')}

// ─── CLAUDE API ──────────────────────────────────────────────────────────
async function callClaudeStep(topic, stepLabel, correctAns, studentAns, strategy){
  const clean=stripHtml(correctAns);
  const stratLine=strategy?`

TEACHER'S METHOD — use this exact approach when giving a guided example:
${strategy}`:'';
  const prompt=`You are a warm, encouraging 6th grade math tutor.

Topic: ${topic}
Step: ${stripHtml(stepLabel)}
Correct answer: ${clean}
Student wrote: "${studentAns}"${stratLine}

GRADING RULES — be very flexible and generous:
- Accept ALL equivalent mathematical forms: 1.5 = 3/2 = 1½ = 6/4; $14.40 = $14.4 = 14.40 ✓
- Accept missing or different units if the number is correct ✓
- Accept close approximations: 6.7% ≈ 6.67% ✓; $18.19 ≈ $18.20 ✓
- Accept differently expressed fractions: 4/7 = 0.571 ✓
- Accept correct setup/process even with minor arithmetic errors
- ONLY mark wrong if the core value or approach is fundamentally incorrect

Return ONLY valid JSON (no markdown, no code blocks, no extra text):
If correct: {"correct":true,"message":"One enthusiastic sentence confirming they got it right","guide":null}
If wrong: {"correct":false,"message":"One friendly sentence explaining specifically what went wrong","guide":"MANDATORY — never null or empty when wrong. Use the teacher method above. Show a DIFFERENT example in 3-4 numbered steps (Step 1 / Step 2 / Step 3). Max 70 words. Students NEED this to understand their mistake."}`;

  const resp=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:400,messages:[{role:'user',content:prompt}]})
  });
  if(!resp.ok) throw new Error('api');
  const data=await resp.json();
  const txt=data.content[0].text.replace(/```json\n?|```/g,'').trim();
  return JSON.parse(txt);
}

// ─── STEP INTERACTIONS ───────────────────────────────────────────────────
async function checkStep(sid){
  const input=document.getElementById(`${sid}_in`);
  const btn=document.getElementById(`${sid}_btn`);
  const fbWrap=document.getElementById(`${sid}_fb`);
  const ansEl=document.getElementById(`${sid}_ans`);
  const meta=STEP_META[sid];
  if(!input||!meta) return;

  const val=input.value.trim();
  if(!val){
    input.classList.add('shake');
    input.style.borderColor='var(--red)';
    const ph=input.placeholder;
    input.placeholder='⚠️ Write your answer first!';
    setTimeout(()=>{input.classList.remove('shake');input.style.borderColor='';input.placeholder=ph;},2000);
    return;
  }

  // Disable + loading
  input.disabled=true;
  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>&nbsp;Checking…';
  fbWrap.innerHTML='';
  fbWrap.className='ai-fb-wrap';

  if(!stepAttempts[sid]) stepAttempts[sid]=0;
  stepAttempts[sid]++;
  const att=stepAttempts[sid];

  try {
    const result=await callClaudeStep(meta.topic, meta.label, meta.ans, val, STRATEGIES[meta.si]);
    if(!result.correct&&!result.guide) result.guide=STRATEGIES[meta.si]||'Look at the steps again and try a different approach.';

    if(result.correct){
      ansEl.classList.add('show');
      btn.innerHTML='✓ Correct!';
      btn.className='check-btn correct';
      fbWrap.innerHTML=`<div class="ai-correct"><span class="ai-icon">🎉</span><span class="ai-text">${escHtml(result.message)}</span></div>`;
      fbWrap.className='ai-fb-wrap show';
      if(!stepDone.has(sid)){stepDone.add(sid);doneCount++;updateProgress();}
    } else {
      btn.disabled=false;
      btn.innerHTML='✔ Check Answer';
      const guideHtml=result.guide?`<div class="ai-guide"><div class="ai-guide-title">📖 Here's a similar example:</div><div class="ai-guide-body">${escHtml(result.guide)}</div></div>`:'';
      if(att>=3){
        // Auto-reveal after 3 wrong attempts
        ansEl.classList.add('show');
        input.disabled=true;
        btn.disabled=true;
        btn.innerHTML='Answer Revealed';
        fbWrap.innerHTML=`<div class="ai-wrong"><span class="ai-icon">💭</span><span class="ai-text">${escHtml(result.message)}</span></div>${guideHtml}<div class="retry-row"><span class="attempt-note">Answer revealed after 3 attempts — keep practicing! 💪</span></div>`;
      } else {
        input.disabled=false;
        const left=3-att;
        fbWrap.innerHTML=`<div class="ai-wrong"><span class="ai-icon">💭</span><span class="ai-text">${escHtml(result.message)}</span></div>${guideHtml}<div class="retry-row"><button class="retry-btn" onclick="retryStep('${sid}')">↩ Try Again (${left} left)</button><button class="show-step-btn" onclick="revealStep('${sid}')">Show Answer</button></div>`;
      }
      fbWrap.className='ai-fb-wrap show';
    }
  } catch(e){
    // API unavailable — graceful fallback
    ansEl.classList.add('show');
    btn.innerHTML='✔ Check Answer';
    btn.disabled=false;
    input.disabled=false;
    fbWrap.innerHTML=`<div class="ai-neutral"><span class="ai-icon">📖</span><span class="ai-text">Compare your answer above with the correct answer.</span></div>${STRATEGIES[meta.si]?`<div class='ai-guide' style='margin-top:10px'><div class='ai-guide-title'>&#128218; Method reminder:</div><div class='ai-guide-body'>${escHtml(STRATEGIES[meta.si])}</div></div>`:``}<div class="retry-row"><button class="sa-btn sa-got" onclick="markStepDone('${sid}')">✓ Got it!</button><button class="sa-btn sa-more" style="padding:6px 14px;border-radius:8px;border:1px solid rgba(245,158,11,.35);background:rgba(245,158,11,.12);color:#fde68a;font-family:Nunito,sans-serif;font-size:12.5px;font-weight:800;cursor:pointer;">🤔 Still working on it</button></div>`;
    fbWrap.className='ai-fb-wrap show';
  }
}

function retryStep(sid){
  const input=document.getElementById(`${sid}_in`);
  const btn=document.getElementById(`${sid}_btn`);
  const fbWrap=document.getElementById(`${sid}_fb`);
  if(input){input.disabled=false;input.value='';input.focus();}
  if(btn){btn.disabled=false;btn.innerHTML='✔ Check Answer';btn.className='check-btn';}
  if(fbWrap){fbWrap.innerHTML='';fbWrap.className='ai-fb-wrap';}
}

function revealStep(sid){
  const ansEl=document.getElementById(`${sid}_ans`);
  const fbWrap=document.getElementById(`${sid}_fb`);
  if(ansEl) ansEl.classList.add('show');
  // Remove retry row from feedback
  const rr=fbWrap?.querySelector('.retry-row');
  if(rr) rr.remove();
}

function markStepDone(sid){
  if(!stepDone.has(sid)){stepDone.add(sid);doneCount++;updateProgress();}
  const fb=document.getElementById(`${sid}_fb`);
  const retryRow=fb?.querySelector('.retry-row');
  if(retryRow) retryRow.innerHTML='<span class="sa-result got">✓ Marked as got it!</span>';
}

// ─── MC INTERACTIONS ──────────────────────────────────────────────────────
async function checkMC(btn, cardId){
  const grid=document.getElementById(`${cardId}_mc`);
  if(!grid||grid.dataset.done) return;
  const isCorrect=btn.dataset.correct==='true';
  const fb=document.getElementById(`${cardId}_fb`);
  const meta=MC_META[cardId];

  if(isCorrect){
    btn.classList.add('correct');
    grid.querySelectorAll('.mc-opt').forEach(b=>b.disabled=true);
    grid.dataset.done='1';
    fb.innerHTML='🎉 <strong>Correct!</strong> Great work!';
    fb.className='mc-feedback ok';
    markCardDone(cardId);
    if(!mcDone.has(cardId)){mcDone.add(cardId);doneCount++;updateProgress();}
  } else {
    btn.classList.add('wrong');
    btn.disabled=true;
    fb.innerHTML='<span class="spinner-sm"></span>Getting a hint…';
    fb.className='mc-feedback loading';
    try {
      const correctBtn=grid.querySelector('[data-correct="true"]');
      const wrongText=btn.textContent.trim();
      const wrongIdx=(meta?.choices||[]).indexOf(wrongText);
      const result=await callClaudeMC(meta?.topic||'Math',meta?.question||'',meta?.problem||'',wrongText,correctBtn?.textContent.trim()||'',wrongIdx,meta?.choices||[],STRATEGIES[meta?.si]);
      if(!result.guide) result.guide=STRATEGIES[meta?.si]||'Review the method and try again.';
      const mcGuide=document.getElementById(`${cardId}_mcguide`);
      fb.innerHTML=`<span class="ai-icon" style="margin-right:6px">💭</span>${escHtml(result.message||result.hint||'Not quite — try another answer!')}`;
      fb.className='mc-feedback no';
      if(mcGuide){
        const mcGuideTxt=result.guide||STRATEGIES[meta?.si]||'Review the method and try again.';
        mcGuide.innerHTML=`<div class="ai-guide"><div class="ai-guide-title">📖 Here&#39;s a worked example:</div><div class="ai-guide-body">${escHtml(mcGuideTxt)}</div></div>`;
        mcGuide.style.display='block';
      }
    } catch(e){
      const mcFbGuide=STRATEGIES[meta?.si]?`<div style='margin-top:8px'><strong>Method reminder:</strong><br>${escHtml(STRATEGIES[meta?.si])}</div>`:'';
      fb.innerHTML='Not quite — try another answer.'+mcFbGuide;
      fb.className='mc-feedback no';
    }
  }
}

async function checkWork(pid, cardId){
  const btn=document.getElementById(`${pid}_btn`);
  const ansEl=document.getElementById(`${pid}_ans`);
  const workBox=document.getElementById(`${pid}_work`);
  const aiFb=document.getElementById(`${pid}_aifb`);
  const meta=PART_META[pid];
  const studentWork=workBox?.value.trim()||'';

  if(!studentWork){
    if(workBox){workBox.style.borderColor='var(--red)';workBox.placeholder='⚠️ Write your work first, then click Check!';}
    setTimeout(()=>{if(workBox){workBox.style.borderColor='';workBox.placeholder='Show your work here…';}},2500);
    return;
  }

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>&nbsp;Checking…';

  try {
    const result=await callClaudePart(meta.topic, meta.question, meta.ans, studentWork, STRATEGIES[meta.si]);
    if(!result.correct&&!result.guide) result.guide=STRATEGIES[meta.si]||'Review the steps and try a different approach.';

    if(result.correct){
      ansEl.classList.add('show');
      btn.innerHTML='✓ Correct!';
      btn.style.background='linear-gradient(135deg,#15803d,#16a34a)';
      if(aiFb) aiFb.innerHTML=`<div class="ai-correct" style="margin-bottom:10px"><span class="ai-icon">🎉</span><span class="ai-text">${escHtml(result.message)}</span></div>`;
      if(!partsDone.has(pid)){partsDone.add(pid);doneCount++;updateProgress();}
      markCardDone(cardId);
    } else {
      const guideHtml=`<div class="ai-guide"><div class="ai-guide-title">📖 Here&#39;s a worked example:</div><div class="ai-guide-body">${escHtml(result.guide||STRATEGIES[meta.si]||'Review the method above and try again.')}</div></div>`;
      if(aiFb) aiFb.innerHTML=`<div class="ai-wrong" style="margin-bottom:10px"><span class="ai-icon">💭</span><span class="ai-text">${escHtml(result.message)}</span></div>${guideHtml}<div class="retry-row" style="margin-top:10px"><button class="retry-btn" onclick="retryWork('${pid}')">↩ Try Again</button><button class="show-step-btn" onclick="revealPartAns('${pid}','${cardId}')">📖 Show Answer</button></div>`;
      btn.innerHTML='✔ Check My Work';
      btn.disabled=false;
    }
  } catch(e){
    ansEl.classList.add('show');
    btn.innerHTML='✓ Answer shown';
    btn.style.opacity='.55';
    if(aiFb) aiFb.innerHTML=`<div class="ai-neutral"><span class="ai-icon">📖</span><span class="ai-text">Compare your work above with the solution.</span></div>${STRATEGIES[meta.si]?`<div class=\'ai-guide\' style=\'margin-top:10px\'><div class=\'ai-guide-title\'>&#128218; Method reminder:</div><div class=\'ai-guide-body\'>${escHtml(STRATEGIES[meta.si])}</div></div>`:``}<div class="retry-row" style="margin-top:8px"><button class="sa-btn sa-got" onclick="markPartDone('${pid}','${cardId}')">✓ I got it!</button></div>`;
    if(!partsDone.has(pid)){partsDone.add(pid);doneCount++;updateProgress();}
    markCardDone(cardId);
  }
}

function retryWork(pid){
  const btn=document.getElementById(`${pid}_btn`);
  const aiFb=document.getElementById(`${pid}_aifb`);
  const workBox=document.getElementById(`${pid}_work`);
  if(btn){btn.disabled=false;btn.innerHTML='✔ Check My Work';btn.style.background='';btn.style.opacity='1';}
  if(aiFb) aiFb.innerHTML='';
  if(workBox) workBox.focus();
}

function revealPartAns(pid, cardId){
  const ansEl=document.getElementById(`${pid}_ans`);
  const aiFb=document.getElementById(`${pid}_aifb`);
  if(ansEl) ansEl.classList.add('show');
  const rr=aiFb?.querySelector('.retry-row');
  if(rr) rr.remove();
  if(!partsDone.has(pid)){partsDone.add(pid);doneCount++;updateProgress();}
  markCardDone(cardId);
}

function markPartDone(pid, cardId){
  if(!partsDone.has(pid)){partsDone.add(pid);doneCount++;updateProgress();}
  markCardDone(cardId);
}

// ─── RENDER ───────────────────────────────────────────────────────────────
const TIER_META={
  worked:{icon:"⭐",name:"Worked Example"},
  mild:{icon:"🟢",name:"Mild"},
  medium:{icon:"🟡",name:"Medium"},
  spicy:{icon:"🌶️",name:"Spicy"},
  spicy2:{icon:"🌶️🌶️",name:"Spicy — Part 2"},
  extra:{icon:"🔥",name:"Extra Spicy"},
  super:{icon:"💥",name:"Super Spicy"}
};

function render(){
  // Count totals — noScaffold tiers convert steps to 1 open-response item
  const noST=['spicy','extra','spicy2','super'];
  DATA.forEach(sec=>sec.levels.forEach(lv=>{
    if(lv.mc) totalCount++;
    if(lv.parts) totalCount+=lv.parts.length;
    if(lv.steps&&lv.steps.length){
      if(!noST.includes(lv.tier)) totalCount+=lv.steps.length;
      else if(!lv.mc&&!lv.parts) totalCount++;
    }
  }));
  updateProgress();

  const tabsEl=document.getElementById('tabs');
  const sectionsEl=document.getElementById('sections');

  DATA.forEach((sec,si)=>{
    const words=sec.title.split(' ');
    const short=sec.emoji+' '+words.slice(0,3).join(' ')+(words.length>3?'…':'');
    const tab=document.createElement('button');
    tab.className='tab-btn'+(si===0?' active':'');
    tab.id=`tab-${si}`;
    tab.innerHTML=`<span class="tab-num">${si+1}</span>${short}`;
    tab.onclick=()=>switchTab(si);
    tabsEl.appendChild(tab);

    const panel=document.createElement('div');
    panel.className='sec-panel'+(si===0?' active':'');
    panel.id=`sec-${si}`;

    let html=`<h2 class="sec-title">${sec.emoji} ${sec.title}</h2><div class="concept-box">${sec.concept}</div>`;

    sec.levels.forEach((lv,li)=>{
      const id=`c${si}_${li}`;
      const m=TIER_META[lv.tier];
      let body='';

      const noScaffold=['spicy','extra','spicy2','super'].includes(lv.tier);
      if(lv.vis&&VIS[lv.vis]&&lv.tier!=='extra'&&lv.tier!=='spicy2') body+=VIS[lv.vis];
      if(lv.problem) body+=`<div class="problem">${lv.problem}</div>`;
      if(lv.hint&&!noScaffold) body+=`<div class="hint-box">💡 <strong>Hint:</strong> ${lv.hint}</div>`;

      // Steps — only shown for worked/mild/medium
      if(lv.steps&&lv.steps.length){
        if(!noScaffold){
          // Scaffolded tiers (worked/mild/medium): step-by-step check inputs
        body+=`<div class="steps">`;
        lv.steps.forEach((st,sti)=>{
          const sid=`${id}_s${sti}`;
          STEP_META[sid]={topic:sec.title, label:st.label, ans:st.ans, si:si};
          body+=`<div class="step">
            <div class="step-lbl"><span class="step-num">${sti+1}</span>${st.label}</div>
            ${st.midVis&&VIS[st.midVis]?VIS[st.midVis]:""}
            <div class="check-input-row">
              <input class="check-input" id="${sid}_in" type="text" placeholder="✏️ Write your answer here, then click Check…" autocomplete="off">
              <button class="check-btn" id="${sid}_btn" onclick="checkStep('${sid}')">✔ Check Answer</button>
            </div>
            <div class="ai-fb-wrap" id="${sid}_fb"></div>
            <div class="step-ans" id="${sid}_ans">${st.ans}</div>
          </div>`;
        });
        body+=`</div>`;
        } else if(!lv.mc&&!lv.parts){
          // No scaffold + steps only → open response
          const pid0=`${id}_p0`;
          const combinedA=lv.steps.map(s=>'<strong>'+s.label.replace(/<[^>]+>/g,'')+'</strong><br>'+s.ans).join('<br><br>');
          PART_META[pid0]={topic:sec.title,question:'Solve the complete problem. Show all your work.',ans:combinedA,si:si};
          body+=`<div class="parts"><div class="part">
            <div class="work-hint">✏️ Solve the full problem — show all your work, then check:</div>
            <textarea class="work-box" id="${pid0}_work" placeholder="Show your complete work here…"></textarea>
            <div class="part-ai-fb" id="${pid0}_aifb"></div>
            <br><button class="show-ans-btn" id="${pid0}_btn" onclick="checkWork('${pid0}','${id}')">✔ Check My Work</button>
            <div class="ans-reveal" id="${pid0}_ans">${combinedA}</div>
          </div></div>`;
        }
        // noScaffold AND has mc: skip steps, mc renders below
      }

      // MC
      if(lv.mc){
        MC_META[id]={topic:sec.title,question:lv.mcQ||'',correctChoice:lv.mc[lv.mcA],si:si,problem:lv.problem||'',choices:lv.mc||[]};
        body+=`<hr class="divider"><div class="mc-question">${lv.mcQ||'Choose the correct answer:'}</div><div class="mc-grid" id="${id}_mc">`;
        lv.mc.forEach((ch,ci)=>{
          body+=`<button class="mc-opt" data-correct="${ci===lv.mcA}" onclick="checkMC(this,'${id}')">${ch}</button>`;
        });
        body+=`</div><div class="mc-feedback" id="${id}_fb"></div><div class="mc-guide-wrap" id="${id}_mcguide" style="display:none;margin-top:4px"></div>`;
      }

      // Open parts
      if(lv.parts){
        body+=`<div class="parts">`;
        lv.parts.forEach((pt,pi)=>{
          const pid=`${id}_p${pi}`;
          PART_META[pid]={topic:sec.title,question:pt.q,ans:pt.ans,si:si};
          body+=`<div class="part">
            <div class="part-q">${pt.q}</div>
            <div class="work-hint">✏️ Write your work below first, then click Show Answer for feedback:</div>
            <textarea class="work-box" id="${pid}_work" placeholder="Show your work here…"></textarea>
            <div class="part-ai-fb" id="${pid}_aifb"></div>
            <br><button class="show-ans-btn" id="${pid}_btn" onclick="checkWork('${pid}','${id}')">✔ Check My Work</button>
            <div class="ans-reveal" id="${pid}_ans">${pt.ans}</div>
          </div>`;
        });
        body+=`</div>`;
      }

      html+=`<div class="card t-${lv.tier}" id="${id}_card">
        <div class="card-hdr" id="${id}_hdr" onclick="toggleCard('${id}')">
          <div class="tier-left">
            <div class="tier-icon">${m.icon}</div>
            <div><div class="tier-name">${m.name}</div><div class="tier-sub">${lv.note}</div></div>
          </div>
          <div class="card-right">
            <span class="done-pill" id="${id}_done">✓ Done!</span>
            <span class="chev">▼</span>
          </div>
        </div>
        <div class="card-body" id="${id}_body">${body}</div>
      </div>`;
    });

    panel.innerHTML=html;
    sectionsEl.appendChild(panel);
  });

  toggleCard('c0_0');
}

function toggleCard(id){
  const body=document.getElementById(`${id}_body`);
  const hdr=document.getElementById(`${id}_hdr`);
  if(!body||!hdr) return;
  const open=body.classList.contains('open');
  body.classList.toggle('open',!open);
  hdr.classList.toggle('open',!open);
}

function switchTab(idx){
  document.querySelectorAll('.tab-btn').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.sec-panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
}

window.markStepDone=markStepDone;

function checkTableInputs(btn){
  const box=btn.closest('.vis-box');
  const inputs=Array.from(box.querySelectorAll('.tbl-input[data-answer]'));
  if(!inputs.length) return;
  let allOk=true, anyEmpty=false, hints=[];
  inputs.forEach(inp=>{
    const raw=inp.value.trim().replace(/[$,%\s]/g,'');
    if(!raw){inp.style.borderColor='var(--amber)';inp.style.borderStyle='dashed';anyEmpty=true;allOk=false;return;}
    const val=parseFloat(raw);
    const ans=parseFloat(inp.dataset.answer);
    const tol=Math.max(Math.abs(ans)*0.02,0.05);
    const ok=!isNaN(val)&&Math.abs(val-ans)<=tol;
    inp.style.borderColor=ok?'var(--green)':'var(--red)';
    inp.style.borderStyle='solid';
    if(!ok&&inp.dataset.hint&&!hints.includes(inp.dataset.hint)) hints.push(inp.dataset.hint);
    if(!ok) allOk=false;
  });
  const fb=btn.nextElementSibling;
  if(!fb) return;
  if(anyEmpty){
    fb.innerHTML='Fill in all the blanks first!';
    fb.style.color='#fde68a';
  } else if(allOk){
    fb.innerHTML='Perfect -- all values are correct!';
    fb.style.color='#86efac';
  } else {
    const hHtml=hints.length
      ?'<br><strong>Hints for red boxes:</strong><ul style="margin:6px 0 0 14px;line-height:1.7">'
        +hints.map(function(h){return '<li>'+h+'</li>';}).join('')+'</ul>':'';
    fb.innerHTML='Some boxes need fixing. Check red boxes and try again.'+hHtml;
    fb.style.color='#fca5a5';
  }
  fb.style.display='block';
}

window.onload=render;
</script>
</body>
</html>
